<div class="weather-posting">
    <h1>Weather</h1>
    <div class="weather-container">
        <div class="today-weather">
            <h2>Today's Weather</h2>
            <div class="day-1-weather">
                <div class="weather-icon"></div>
                <p class="town-name"></p>
                <p class="weather-type"></p>
                <div class="hourly-slider"></div>
            </div>
            <p class="temperature"></p>
        </div>

        <div class="tomorrow-weather">
            <h2>Tomorrow's Weather</h2>
            <div class="day-2-weather">
                <div class="weather-icon"></div>
                <p class="town-name"></p>
                <p class="weather-type"></p>
                <div class="hourly-slider"></div>
                <div class="hourly-slider-container"></div>
            </div>
            <p class="temperature"></p>
        </div>
    </div>
    <div class="detailed-weather-container"></div>
    <div id="detailed-info-container"></div>
</div>
<script src="script/weather.js"></script>
